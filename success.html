<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0d1f35;--blue:#29B6D8;--yellow:#F5C518;--white:#fff}

.highlight{color:var(--yellow)}
.btn{display:inline-block;background:var(--yellow);color:#0d1a2e;font-weight:800;font-size:15px;padding:14px 32px;border-radius:12px;text-decoration:none;transition:opacity .2s}
